# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-amr"
BBFILE_PATTERN_meta-amr = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-amr = "6"

LAYERDEPENDS_meta-amr = "core"
LAYERSERIES_COMPAT_meta-amr = "scarthgap"
